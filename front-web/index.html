    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- FOUC prevention script -->
    <script>
      (function() {
        const theme = localStorage.getItem('portfolio-theme') || 'system';
        if (theme === 'dark' || theme === 'night') {
          document.documentElement.classList.add(theme);
        } else if (theme === 'system') {
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50 dark:bg-slate-900 night:bg-black text-slate-800 dark:text-slate-200 night:text-slate-300 transition-colors duration-300 antialiased font-sans">
